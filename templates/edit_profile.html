{% extends "base.html" %}
{% block title %}Edit Profile — ZovoAssets{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div style="margin-bottom:2rem;">
    <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:0.2rem;">Edit Profile</h1>
    <p style="color:var(--text-muted);">Update your personal information</p>
  </div>
  <div class="z-card">
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:1.25rem;">
        <label class="z-label">Full Name</label>
        <input type="text" name="full_name" class="z-input" value="{{ user.full_name }}" required>
      </div>
      <div style="margin-bottom:1.25rem;">
        <label class="z-label">Email Address</label>
        <input type="email" class="z-input" value="{{ user.email }}" disabled style="opacity:0.6;cursor:not-allowed;">
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">Email cannot be changed.</p>
      </div>
      <div style="margin-bottom:1.25rem;">
        <label class="z-label">Phone Number</label>
        <input type="text" name="phone" class="z-input" value="{{ user.phone }}" placeholder="+1 (555) 000-0000">
      </div>
      <div style="margin-bottom:1.75rem;">
        <label class="z-label">Country</label>
        <input type="text" name="country" class="z-input" value="{{ prof.country }}" placeholder="e.g. Nigeria">
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button type="submit" class="btn-gold">Save Changes</button>
        <a href="{% url 'profile' %}" class="btn-outline-gold">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
