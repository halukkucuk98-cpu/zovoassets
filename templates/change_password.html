{% extends "base.html" %}
{% block title %}Change Password — ZovoAssets{% endblock %}
{% block content %}
<div style="max-width:480px;">
  <div style="margin-bottom:2rem;">
    <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:0.2rem;">Change Password</h1>
    <p style="color:var(--text-muted);">Keep your account secure</p>
  </div>
  <div class="z-card">
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:1.25rem;">
        <label class="z-label">Current Password</label>
        <input type="password" name="old_password" class="z-input" placeholder="Your current password" required>
      </div>
      <div style="margin-bottom:1.25rem;">
        <label class="z-label">New Password</label>
        <input type="password" name="new_password" class="z-input" placeholder="Min 8 characters" required>
      </div>
      <div style="margin-bottom:1.75rem;">
        <label class="z-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="z-input" placeholder="Repeat new password" required>
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button type="submit" class="btn-gold">Update Password</button>
        <a href="{% url 'profile' %}" class="btn-outline-gold">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
